name: Release

# Tag a commit (on any branch) to build and publish that snapshot.
#   git tag 0.9.4-62 && git push origin 0.9.4-62
# The tagged commit decides what gets built.
on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'            # bare version tags too, e.g. 0.9.4-62
  workflow_dispatch:        # manual run builds artifacts without publishing

permissions:
  contents: write            # needed to create the GitHub Release

jobs:
  # Build a native package per platform (jpackage), plus the plain jar on Windows.
  package:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install deb/rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot binutils

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $ver) { $ver = "dev" }
          New-Item -ItemType Directory -Force out | Out-Null

          if ($IsWindows) {
            $plat = "win64"
            pwsh -NoProfile -File tools/build-app.ps1 -Type app-image
            Compress-Archive -Path target/dist/sancho/* -DestinationPath "out/sancho-$ver-win64.zip" -Force
          }
          elseif ($IsMacOS) {
            $plat = "macos-arm64"
            # macOS rejects a leading-zero bundle version (0.9.4); use 1.0.0 for the
            # bundle. The file name and the app's own version stay 0.9.4-<n>.
            pwsh -NoProfile -File tools/build-app.ps1 -Type dmg -AppVersion 1.0.0
            Get-ChildItem target/dist/*.dmg | ForEach-Object { Copy-Item $_.FullName "out/sancho-$ver-macos-arm64.dmg" }
          }
          else {
            $plat = "linux-x86_64"
            pwsh -NoProfile -File tools/build-app.ps1 -Type deb
            pwsh -NoProfile -File tools/build-app.ps1 -Type rpm
            Get-ChildItem target/dist/*.deb | ForEach-Object { Copy-Item $_.FullName "out/sancho-$ver-linux-x86_64.deb" }
            Get-ChildItem target/dist/*.rpm | ForEach-Object { Copy-Item $_.FullName "out/sancho-$ver-linux-x86_64.rpm" }
          }

          # Self-contained runnable uber-jar for this platform (needs only a JRE):
          # java -jar sancho-<ver>-<plat>.jar
          $uber = Get-ChildItem target/*-all.jar | Select-Object -First 1
          Copy-Item $uber.FullName "out/sancho-$ver-$plat.jar"

          Get-ChildItem out | ForEach-Object { Write-Host $_.Name }

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sancho-${{ matrix.os }}
          path: out/*
          if-no-files-found: error

  # Collect all platform artifacts and publish one Release with CHANGELOG notes.
  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release delete "$tag" --yes --cleanup-tag=false 2>$null
          $files = Get-ChildItem dist -File -Recurse | ForEach-Object { $_.FullName }

          # Release notes from the matching CHANGELOG.md section (else auto-generate).
          $useChangelog = $false
          if (Test-Path CHANGELOG.md) {
            $lines = Get-Content CHANGELOG.md
            $start = ($lines | Select-String -Pattern ("^##\s*\[" + [regex]::Escape($tag) + "\]") | Select-Object -First 1).LineNumber
            if ($start) {
              $body = @()
              for ($i = $start; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match '^##\s') { break }
                $body += $lines[$i]
              }
              ($body -join "`n").Trim() | Set-Content -Encoding UTF8 release-notes.md
              $useChangelog = $true
            }
          }

          if ($useChangelog) {
            gh release create "$tag" $files --title "Sancho $tag" --notes-file release-notes.md
          } else {
            gh release create "$tag" $files --title "Sancho $tag" --generate-notes
          }
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed (check Settings -> Actions -> Workflow permissions = Read and write)" }
