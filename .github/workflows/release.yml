name: Release

# Tag a commit (on any branch) to build and publish that snapshot.
#   git tag 0.9.4-65 && git push origin 0.9.4-65
# The tagged commit decides what gets built.
on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'            # bare version tags too, e.g. 0.9.4-65
  workflow_dispatch:        # manual run builds artifacts without publishing

# Only one release run per ref at a time. If the tag is moved (re-release), the
# in-flight run is cancelled before the new one starts, so two runs never delete/
# recreate and upload to the same GitHub Release at once (which fails the uploads).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write            # needed to create the GitHub Release

jobs:
  # Create the Release first (with CHANGELOG notes) so the per-platform jobs can
  # upload straight into it — this avoids upload/download-artifact entirely. On a
  # manual run the create step is skipped, so the matrix still runs as a build check.
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create release with CHANGELOG notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release delete "$tag" --yes --cleanup-tag=false 2>$null

          # Release notes from the matching CHANGELOG.md section (else auto-generate).
          $hasNotes = $false
          if (Test-Path CHANGELOG.md) {
            $lines = Get-Content CHANGELOG.md
            $start = ($lines | Select-String -Pattern ("^##\s*\[" + [regex]::Escape($tag) + "\]") | Select-Object -First 1).LineNumber
            if ($start) {
              $body = @()
              for ($i = $start; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match '^##\s') { break }
                $body += $lines[$i]
              }
              ($body -join "`n").Trim() | Set-Content -Encoding UTF8 release-notes.md
              $hasNotes = $true
            }
          }

          if ($hasNotes) {
            gh release create "$tag" --title "Sancho $tag" --notes-file release-notes.md
          } else {
            gh release create "$tag" --title "Sancho $tag" --generate-notes
          }
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed (check Settings -> Actions -> Workflow permissions = Read and write)" }

  # Build a native package per platform (jpackage) + a self-contained uber-jar, and
  # upload them straight into the release created above.
  package:
    name: package (${{ matrix.os }})
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install deb/rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot binutils

      - name: Ensure WiX 3.14 on PATH (Windows, for the .msi installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # windows-latest already ships WiX 3.14; install (unpinned, no downgrade)
          # only if candle.exe is missing, then make sure its bin is on PATH so
          # jpackage can find candle/light.
          $bin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path (Join-Path $bin "candle.exe"))) {
            choco install wixtoolset -y --no-progress
          }
          if (Test-Path $bin) { $bin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8 }

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          if (-not $ver) { $ver = "dev" }
          New-Item -ItemType Directory -Force out | Out-Null

          if ($IsWindows) {
            $plat = "win64"
            pwsh -NoProfile -File tools/build-app.ps1 -Type app-image
            Compress-Archive -Path target/dist/sancho/* -DestinationPath "out/sancho-$ver-win64.zip" -Force
            # Also build the .msi installer (reuses the assembled app-input).
            pwsh -NoProfile -File tools/build-app.ps1 -Type msi
            Get-ChildItem target/dist/*.msi | ForEach-Object { Copy-Item $_.FullName "out/sancho-$ver-win64.msi" }
          }
          elseif ($IsMacOS) {
            $plat = "macos-arm64"
            # macOS rejects a leading-zero bundle version (0.9.4); use 1.0.0 for the
            # bundle. The file name and the app's own version stay 0.9.4-<n>.
            pwsh -NoProfile -File tools/build-app.ps1 -Type dmg -AppVersion 1.0.0
            Get-ChildItem target/dist/*.dmg | ForEach-Object { Copy-Item $_.FullName "out/sancho-$ver-macos-arm64.dmg" }
          }
          else {
            $plat = "linux-x86_64"
            pwsh -NoProfile -File tools/build-app.ps1 -Type deb
            pwsh -NoProfile -File tools/build-app.ps1 -Type rpm
            Get-ChildItem target/dist/*.deb | ForEach-Object { Copy-Item $_.FullName "out/sancho-$ver-linux-x86_64.deb" }
            Get-ChildItem target/dist/*.rpm | ForEach-Object { Copy-Item $_.FullName "out/sancho-$ver-linux-x86_64.rpm" }
          }

          # Self-contained runnable uber-jar for this platform (needs only a JRE):
          # java -jar sancho-<ver>-<plat>.jar
          $uber = Get-ChildItem target/*-all.jar | Select-Object -First 1
          Copy-Item $uber.FullName "out/sancho-$ver-$plat.jar"

          Get-ChildItem out | ForEach-Object { Write-Host $_.Name }

      - name: Verify the .msi is multilingual
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msi = (Get-ChildItem out/sancho-*-win64.msi | Select-Object -First 1).FullName

          # Must match the base + $EXTRA language table in tools/wix-multilang.ps1:
          # en 1033 (base) + de 1031, fr 1036, it 1040, ja 1041, pt 2070/1046, zh 2052, es 3082.
          $expected = @(1033, 1031, 1036, 1040, 1041, 2070, 1046, 2052, 3082)
          $inst = New-Object -ComObject WindowsInstaller.Installer

          # 1) the package language list (Template summary property, "<platform>;<lcid,...>").
          $template = $inst.SummaryInformation($msi, 0).Property(7)
          Write-Host "MSI Template summary = $template"
          $langs = ($template -split ';')[-1] -split ',' | ForEach-Object { [int]$_ }
          $missing = $expected | Where-Object { $_ -notin $langs }
          if ($missing) { throw "not multilingual: missing LCIDs $($missing -join ',') (got $($langs -join ','))" }

          # 2) the language transforms are actually embedded (one sub-storage per non-base LCID).
          $db = $inst.OpenDatabase($msi, 0)
          $view = $db.OpenView("SELECT ``Name`` FROM _Storages"); $view.Execute()
          $n = 0; while ($view.Fetch()) { $n++ }
          $wantTransforms = $expected.Count - 1
          Write-Host "  embedded transforms = $n (expected $wantTransforms)"
          if ($n -lt $wantTransforms) { throw "expected $wantTransforms embedded transforms, found $n" }
          Write-Host "  multilingual MSI OK ($($langs.Count) languages, $n transforms)"

      - name: Smoke-test the .msi (silent install / verify / uninstall)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msi = (Get-ChildItem out/sancho-*-win64.msi | Select-Object -First 1).FullName
          $exe = "C:\Program Files\sancho\sancho.exe"
          $torrentCmd = "HKLM:\SOFTWARE\Classes\bittorrent\shell\open\command"

          function Invoke-Msi([string[]]$a) {
            $p = Start-Process msiexec -ArgumentList $a -Wait -PassThru
            if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
              throw "msiexec $($a -join ' ') -> exit $($p.ExitCode)"
            }
          }

          Write-Host "== 1) silent install (associations ON by default) =="
          Invoke-Msi @("/i", $msi, "/qn", "/l*v", "install.log")
          if (-not (Test-Path $exe)) { throw "install: $exe is missing" }
          $cmd = (Get-Item $torrentCmd).GetValue("")
          Write-Host "  .torrent command = $cmd"
          if ($cmd -notmatch 'sancho\.exe.+-l.+%1') { throw "install: torrent association wrong: $cmd" }
          foreach ($p in @("ed2k","magnet","sig2dat")) {
            if (-not (Test-Path "HKLM:\SOFTWARE\Classes\$p\shell\open\command")) {
              throw "install: $p protocol not registered"
            }
          }
          Write-Host "  associations registered OK"

          Write-Host "== 2) silent uninstall (must remove files + registry) =="
          Invoke-Msi @("/x", $msi, "/qn", "/l*v", "uninstall.log")
          if (Test-Path $exe) { throw "uninstall: $exe still present" }
          if (Test-Path "HKLM:\SOFTWARE\Classes\bittorrent") { throw "uninstall: bittorrent key not removed" }
          if (Test-Path "HKLM:\SOFTWARE\Classes\ed2k")       { throw "uninstall: ed2k key not removed" }
          Write-Host "  clean uninstall OK"

          Write-Host "== 3) silent install with REGISTERASSOC=0 (no associations) =="
          Invoke-Msi @("/i", $msi, "/qn", "REGISTERASSOC=0", "/l*v", "install0.log")
          if (-not (Test-Path $exe)) { throw "install0: $exe is missing" }
          if (Test-Path "HKLM:\SOFTWARE\Classes\bittorrent") { throw "install0: associations registered despite REGISTERASSOC=0" }
          Write-Host "  REGISTERASSOC=0 correctly skipped associations OK"
          Invoke-Msi @("/x", $msi, "/qn")
          Write-Host "MSI smoke-test PASSED"

      - name: Dump MSI logs on failure
        if: ${{ runner.os == 'Windows' && failure() }}
        shell: pwsh
        run: |
          Get-ChildItem *.log -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "==================== $($_.Name) (tail) ===================="
            Get-Content $_.FullName -Tail 60
          }

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem out -File | ForEach-Object { $_.FullName }
          gh release upload "$tag" $files --clobber
          if ($LASTEXITCODE -ne 0) { throw "gh release upload failed" }
