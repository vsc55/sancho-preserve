name: Build

# Fast compile/package check on every push and pull request to main, so
# regressions surface before a release tag is cut.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'appimage/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # The pom's OS/arch profiles auto-select the SWT fragment, so the same
      # command builds on Linux (gtk), Windows (win32) and macOS (cocoa/aarch64).
      - name: Build
        run: mvn -B -ntp clean package
