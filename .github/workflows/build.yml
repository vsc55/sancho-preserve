name: Build

# Fast compile/package check on every push and pull request to main, so
# regressions surface before a release tag is cut.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'appimage/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Compilation only needs the SWT/JFace jars on the classpath (not native
      # libraries), so this runs fine on Linux even though the app targets win32.
      - name: Build
        run: mvn -B -ntp clean package
