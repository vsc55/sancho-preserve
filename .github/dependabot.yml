version: 2

updates:
  # GitHub Actions used by the workflows (e.g. checkout, setup-java). Keeping these
  # current avoids the Node-runtime deprecation churn we hit manually.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]

  # Maven dependencies and plugins (pom.xml).
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    ignore:
      # SWT is version-locked to the vendored *unsigned* JFace in local-repo, which
      # is regenerated by hand (tools/unsign-libs.ps1). SWT and JFace must move
      # together, so update them manually rather than via separate Dependabot PRs.
      - dependency-name: "org.eclipse.platform:*"
      # Trove 2.x exposes the flat gnu.trove package; 3.x reorganized it into
      # sub-packages and would not compile. Allow patch/minor, pin the major.
      - dependency-name: "net.sf.trove4j:trove4j"
        update-types: ["version-update:semver-major"]
